<!DOCTYPE html>
<html lang="nb">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Budsjett">
<title>Budsjett</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --b:#4A7FC1;--c:#C4729A;--bg:#F5F4F0;--card:#fff;
  --border:rgba(0,0,0,0.07);--text:#1A1A1A;--radius:16px;
  --st:env(safe-area-inset-top,0px);--sb:env(safe-area-inset-bottom,0px)
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);
  max-width:430px;margin:0 auto;min-height:100dvh;overflow-x:hidden;
  -webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased}
button{font-family:'DM Sans',sans-serif;cursor:pointer}
input{font-family:'DM Sans',sans-serif}
.header{background:var(--card);padding:calc(var(--st) + 14px) 18px 12px;
  border-bottom:0.5px solid var(--border);position:sticky;top:0;z-index:50}
.header-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.logo{font-size:20px;font-weight:700;letter-spacing:-0.5px}
.user-switcher{display:flex;gap:6px}
.ubtn{padding:6px 14px;border-radius:20px;border:none;font-size:13px;font-weight:500;transition:all .18s}
.ubtn.b-on{background:var(--b);color:#fff}
.ubtn.c-on{background:var(--c);color:#fff}
.ubtn.off{background:#F0F0EE;color:#888}
.tabs{display:flex;background:#EEECEA;border-radius:11px;padding:3px;gap:2px}
.tab{flex:1;padding:7px 0;border-radius:8px;border:none;font-size:13px;font-weight:500;
  background:transparent;color:#999;transition:all .18s}
.tab.on{background:#fff;color:var(--text);font-weight:600;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.content{overflow-y:auto;padding-bottom:calc(var(--sb) + 30px)}
.card{background:var(--card);border-radius:var(--radius);border:0.5px solid var(--border);
  padding:16px;margin:12px 16px 0}
.card-title{font-size:15px;font-weight:600;margin-bottom:12px}
.pie-wrap{display:flex;justify-content:center;padding:16px 16px 0}
#pieCanvas{cursor:pointer}
.filter-row{display:flex;gap:7px;padding:14px 16px 0;justify-content:center;flex-wrap:wrap}
.fbtn{padding:6px 15px;border-radius:20px;border:1.5px solid #E0E0E0;
  background:#fff;color:#666;font-size:13px;font-weight:500;transition:all .18s}
.fbtn.fa{border-color:#333;background:#333;color:#fff}
.fbtn.fb{border-color:var(--b);background:var(--b);color:#fff}
.fbtn.fc{border-color:var(--c);background:var(--c);color:#fff}
.legend-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:12px 16px 0}
.leg{background:var(--card);border:0.5px solid var(--border);border-radius:12px;
  padding:10px 12px;cursor:pointer;transition:all .18s;text-align:left;width:100%}
.leg-dot-row{display:flex;align-items:center;gap:6px;margin-bottom:4px}
.leg-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0}
.leg-cat{font-size:13px;color:#555;font-weight:500}
.leg-amt{font-size:16px;font-weight:700}
.leg-pct{font-size:12px;color:#aaa;margin-top:1px}
.detail-box{margin:10px 16px 0;background:var(--card);border-radius:var(--radius);
  border:0.5px solid var(--border);padding:14px;display:none}
.detail-box.open{display:block}
.det-title{font-weight:600;font-size:15px;margin-bottom:10px}
.det-row{display:flex;justify-content:space-between;align-items:center;
  padding:7px 0;border-bottom:0.5px solid #F5F5F5}
.det-row:last-child{border-bottom:none}
.det-meta{font-size:12px;color:#bbb;margin-top:2px}
.delbtn{background:none;border:none;color:#ccc;font-size:20px;padding:2px 6px;
  line-height:1;border-radius:6px;transition:color .15s}
.delbtn:active{color:#e05a5a}
.amt-input{width:100%;padding:13px 14px;border:0.5px solid #E8E8E8;border-radius:11px;
  font-size:22px;font-weight:700;background:#FAFAF8;outline:none;color:var(--text);
  -webkit-appearance:none}
.cat-pills{display:flex;flex-wrap:wrap;gap:8px;margin:12px 0}
.cpill{padding:7px 15px;border-radius:20px;border:1.5px solid #E8E8E8;
  background:#fff;color:#555;font-size:13px;font-weight:500;transition:all .18s}
.cpill.on{color:#fff;border-color:transparent}
.log-btn{width:100%;padding:15px;border-radius:13px;border:none;
  font-size:16px;font-weight:700;letter-spacing:-0.3px;transition:all .2s;margin-top:4px}
.log-btn.rdy{color:#fff}
.log-btn.dis{background:#EEECEA;color:#bbb;cursor:not-allowed}
.add-cat-row{display:flex;gap:8px;margin-top:10px}
.add-cat-in{flex:1;padding:9px 12px;border:0.5px solid #E8E8E8;
  border-radius:9px;font-size:14px;outline:none;background:#FAFAF8}
.add-cat-btn{padding:9px 16px;border-radius:9px;border:none;
  background:#333;color:#fff;font-size:14px;font-weight:600}
.rm-hint{font-size:12px;color:#bbb;margin:10px 0 6px}
.rm-pills{display:flex;flex-wrap:wrap;gap:6px}
.rm-pill{display:flex;align-items:center;gap:5px;background:#F5F5F3;
  border-radius:16px;padding:5px 10px;font-size:13px}
.rm-x{background:none;border:none;color:#bbb;font-size:16px;padding:0 2px;line-height:1}
.bud-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:12px 16px 0}
.bud-card{background:var(--card);border:0.5px solid var(--border);border-radius:14px;padding:14px}
.bud-name{font-size:12px;color:#aaa;margin-bottom:4px}
.bud-amt{font-size:20px;font-weight:700}
.bud-sub{font-size:12px;color:#bbb;margin-top:2px}
.bar-bg{height:5px;background:#F0F0EE;border-radius:3px;margin-top:8px}
.bar-fill{height:100%;border-radius:3px;transition:width .4s}
.set-bud{display:block;margin:12px auto 0;padding:8px 20px;border-radius:20px;
  border:0.5px solid #E0E0E0;background:#fff;color:#666;font-size:13px}
.month-card{background:var(--card);border:0.5px solid var(--border);
  border-radius:var(--radius);margin:10px 16px 0;overflow:hidden}
.month-hdr{display:flex;justify-content:space-between;align-items:center;
  padding:14px 16px;cursor:pointer;width:100%;background:none;border:none;text-align:left}
.month-name{font-size:15px;font-weight:600;text-transform:capitalize}
.month-sub{font-size:12px;color:#aaa;margin-top:3px}
.month-r{text-align:right}
.month-total{font-size:16px;font-weight:700}
.month-cnt{font-size:12px;color:#aaa;margin-top:2px}
.month-body{border-top:0.5px solid var(--border);padding:12px 16px;display:none}
.month-body.open{display:block}
.cat-badges{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.cbadge{padding:4px 10px;border-radius:10px;font-size:12px;font-weight:600}
.winner-card{background:var(--card);border-radius:var(--radius);
  border:0.5px solid var(--border);margin:16px 16px 0;padding:20px;text-align:center}
.trophy{font-size:32px;margin-bottom:8px}
.winner-name{font-size:22px;font-weight:700}
.winner-sub{font-size:14px;color:#888;margin-top:5px}
.winner-amt{font-size:28px;font-weight:700;margin-top:8px}
.lb-card{background:var(--card);border-radius:var(--radius);
  border:0.5px solid var(--border);margin:10px 16px 0;padding:16px}
.lb-top{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.lb-av{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;color:#fff;font-weight:700;font-size:15px;flex-shrink:0}
.lb-name{font-size:15px;font-weight:700}
.lb-diff{font-size:12px;color:#aaa;margin-top:2px}
.lb-spent{font-size:20px;font-weight:700}
.lb-lbl{font-size:12px;color:#bbb}
.mini-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-top:12px}
.mini{background:#F7F6F3;border-radius:8px;padding:8px 10px}
.mini-n{font-size:11px;color:#aaa}
.mini-v{font-size:13px;font-weight:600;margin-top:2px}
.alltime{margin:14px 16px 0}
.alltime-title{font-size:15px;font-weight:600;color:#555;margin-bottom:10px}
.at-card{background:var(--card);border-radius:14px;border:0.5px solid var(--border);
  padding:12px 16px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;
  align-items:flex-end;justify-content:center;z-index:200;opacity:0;
  pointer-events:none;transition:opacity .2s}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:#fff;border-radius:24px 24px 0 0;
  padding:24px 20px calc(var(--sb) + 24px);width:100%;max-width:430px;
  transform:translateY(100%);transition:transform .28s cubic-bezier(.32,1,.4,1)}
.modal-overlay.open .modal{transform:translateY(0)}
.modal-title{font-size:17px;font-weight:700;margin-bottom:16px}
.modal-lbl{font-size:13px;color:#666;display:block;margin-bottom:5px}
.modal-in{width:100%;padding:11px 12px;border:0.5px solid #E0E0E0;border-radius:9px;
  font-size:16px;outline:none;margin-bottom:12px;font-family:'DM Sans',sans-serif}
.modal-btns{display:flex;gap:10px;margin-top:8px}
.modal-cancel{flex:1;padding:13px;border-radius:11px;border:0.5px solid #E0E0E0;
  background:#fff;color:#666;font-size:15px}
.modal-save{flex:1;padding:13px;border-radius:11px;border:none;
  background:#1A1A1A;color:#fff;font-size:15px;font-weight:600}
.toast{position:fixed;top:calc(var(--st) + 70px);left:50%;
  transform:translateX(-50%) translateY(-10px);background:#1A1A1A;color:#fff;
  padding:10px 22px;border-radius:20px;font-size:14px;z-index:300;
  opacity:0;transition:all .25s;white-space:nowrap;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.sync-dot{width:7px;height:7px;border-radius:50%;background:#ccc;
  display:inline-block;margin-left:6px;transition:background .3s}
.sync-dot.ing{background:#f0a830;animation:pulse 1s infinite}
.sync-dot.ok{background:#5baa8a}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.empty{text-align:center;padding:50px 20px;color:#aaa;font-size:15px}
.pie-legend-row{display:flex;align-items:center;gap:6px;font-size:12px;
  color:#aaa;justify-content:center;margin-top:8px;flex-wrap:wrap}
.pie-legend-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0}
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<div class="header">
  <div class="header-top">
    <span class="logo">Budsjett <span class="sync-dot" id="syncDot"></span></span>
    <div class="user-switcher">
      <button class="ubtn b-on" id="btnB">Benjamin</button>
      <button class="ubtn c-on off" id="btnC">Camilla</button>
    </div>
  </div>
  <div class="tabs">
    <button class="tab on" id="tab-hjem">Hjem</button>
    <button class="tab" id="tab-historikk">Historikk</button>
    <button class="tab" id="tab-leaderboard">Toppliste</button>
  </div>
</div>

<div class="content" id="content"></div>

<div class="modal-overlay" id="budModal">
  <div class="modal">
    <div class="modal-title">Sett månedlig budsjett</div>
    <label class="modal-lbl">Benjamin (kr/mnd)</label>
    <input class="modal-in" type="number" id="budB" placeholder="0">
    <label class="modal-lbl">Camilla (kr/mnd)</label>
    <input class="modal-in" type="number" id="budC" placeholder="0">
    <div class="modal-btns">
      <button class="modal-cancel" id="modalCancel">Avbryt</button>
      <button class="modal-save" id="modalSave">Lagre</button>
    </div>
  </div>
</div>

<!-- Firebase compat SDK — guaranteed to define window.firebase before our script -->
<script>
// Inline Firebase compat v9 via dynamic loading with guaranteed ordering
(function() {
  var scripts = [
    "https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js",
    "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"
  ];
  var loaded = 0;
  function onLoad() {
    loaded++;
    if (loaded === scripts.length) initApp();
  }
  scripts.forEach(function(src) {
    var s = document.createElement("script");
    s.src = src;
    s.onload = onLoad;
    document.head.appendChild(s);
  });
})();
</script>

<script>
// ─────────────────────────────────────────────────────────
// Constants & State (defined immediately, used after Firebase loads)
// ─────────────────────────────────────────────────────────
var PAL_B = "#4A7FC1";  // Benjamin blue
var PAL_C = "#C4729A";  // Camilla pink
// Per-category colours (index-stable)
var CAT_PAL = ["#5BAA8A","#D4913A","#8B6FD4","#6BAA6B","#C47272","#7AB8D4","#A0A0A0","#E0A0C0"];

var USERS = ["Benjamin","Camilla"];

var S = {
  user: "Benjamin", tab: "hjem", filter: "begge",
  pieSel: null, showAddCat: false, catSel: null,
  expandedMonth: null, newCat: "",
  cats: ["Mat","Takeaway","Klær","Date","Annet"],
  budgets: {Benjamin:0, Camilla:0},
  entries: {}
};

// ─────────────────────────────────────────────────────────
// Helpers
// ─────────────────────────────────────────────────────────
function monthKey(d) {
  d = d || new Date();
  return d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0");
}
function monthLabel(k) {
  var p = k.split("-");
  return new Date(Number(p[0]), Number(p[1])-1)
    .toLocaleString("nb-NO", {month:"long", year:"numeric"});
}
function fmt(n) { return Math.round(n).toLocaleString("nb-NO"); }
function uc(u) { return u === "Benjamin" ? PAL_B : PAL_C; }
function catColor(cat) {
  var i = S.cats.indexOf(cat);
  return CAT_PAL[i >= 0 ? i % CAT_PAL.length : 0];
}

function getEntries(m) { return S.entries[m || monthKey()] || []; }

// Returns entries filtered by current user filter
function getFiltered(m) {
  var e = getEntries(m);
  if (S.filter === "begge") return e;
  return e.filter(function(x){ return x.user === S.filter; });
}

// Category totals for the pie/legend
// When filter=begge, pie shows Benjamin vs Camilla per category (split segments)
// For legend totals we sum all filtered entries
function catTotals(m) {
  var t = {};
  getFiltered(m).forEach(function(e){ t[e.category] = (t[e.category]||0) + e.amount; });
  return t;
}

// Sorted array of [cat, value] descending
function sortedCatTotals(m) {
  var t = catTotals(m);
  return Object.keys(t).map(function(cat){ return [cat, t[cat]]; })
    .sort(function(a,b){ return b[1]-a[1]; });
}

function totalSpent(user, m) {
  return getEntries(m).filter(function(e){ return !user || e.user === user; })
    .reduce(function(s,e){ return s + e.amount; }, 0);
}
function allMonths() { return Object.keys(S.entries).sort().reverse(); }

// ─────────────────────────────────────────────────────────
// Firebase (called after SDK loads)
// ─────────────────────────────────────────────────────────
var db, settingsRef, entriesRef;

function initApp() {
  firebase.initializeApp({
    apiKey: "AIzaSyD18s3ODifoqC3Tfv-bBGKg6137B1jIXQk",
    authDomain: "budsjett-app-6c15d.firebaseapp.com",
    projectId: "budsjett-app-6c15d",
    storageBucket: "budsjett-app-6c15d.firebasestorage.app",
    messagingSenderId: "706751934401",
    appId: "1:706751934401:web:d46c390437cac1a2fec940"
  });

  db = firebase.firestore();
  settingsRef = db.collection("app").doc("settings");
  entriesRef  = db.collection("app").doc("entries");

  settingsRef.onSnapshot(function(snap) {
    if (snap.exists) {
      var d = snap.data();
      if (d.categories && d.categories.length) S.cats = d.categories;
      if (d.budgets) S.budgets = d.budgets;
    }
    render();
  }, function(){ render(); });

  entriesRef.onSnapshot(function(snap) {
    if (snap.exists) S.entries = snap.data().months || {};
    setSynced();
    render();
  }, function(){ setSynced(); render(); });

  setupDelegation();
  render();
}

function setSyncing(){ document.getElementById("syncDot").className = "sync-dot ing"; }
function setSynced(){  document.getElementById("syncDot").className = "sync-dot ok";  }

function saveSettings() {
  if (!settingsRef) return;
  setSyncing();
  settingsRef.set({categories: S.cats, budgets: S.budgets}, {merge:true})
    .then(setSynced).catch(setSynced);
}
function saveEntries() {
  if (!entriesRef) return;
  setSyncing();
  entriesRef.set({months: S.entries})
    .then(setSynced).catch(setSynced);
}

// ─────────────────────────────────────────────────────────
// Toast
// ─────────────────────────────────────────────────────────
function showToast(msg) {
  var t = document.getElementById("toast");
  t.textContent = msg; t.classList.add("show");
  setTimeout(function(){ t.classList.remove("show"); }, 2500);
}

// ─────────────────────────────────────────────────────────
// Pie — when filter=begge, draw Benjamin/Camilla halves per category
// ─────────────────────────────────────────────────────────
function drawPie() {
  var cv = document.getElementById("pieCanvas"); if(!cv) return;
  var dpr = window.devicePixelRatio||1, SZ=260;
  cv.width=SZ*dpr; cv.height=SZ*dpr;
  cv.style.width=SZ+"px"; cv.style.height=SZ+"px";
  var ctx=cv.getContext("2d"); ctx.scale(dpr,dpr);
  var cx=SZ/2, cy=SZ/2, R=SZ*0.39, IR=SZ*0.21;
  ctx.clearRect(0,0,SZ,SZ);

  // Build segments: when "begge", split each category into B + C portions
  var segments = []; // {cat, user, amount, color}
  var m = monthKey();

  if (S.filter === "begge") {
    // Each category gets two sub-segments (B and C), ordered B then C
    S.cats.forEach(function(cat) {
      var bAmt = getEntries(m).filter(function(e){ return e.user==="Benjamin" && e.category===cat; })
                  .reduce(function(s,e){ return s+e.amount; },0);
      var cAmt = getEntries(m).filter(function(e){ return e.user==="Camilla" && e.category===cat; })
                  .reduce(function(s,e){ return s+e.amount; },0);
      if (bAmt > 0) segments.push({cat:cat, user:"Benjamin", amount:bAmt});
      if (cAmt > 0) segments.push({cat:cat, user:"Camilla",  amount:cAmt});
    });
  } else {
    sortedCatTotals(m).forEach(function(pair) {
      segments.push({cat:pair[0], user:S.filter, amount:pair[1]});
    });
  }

  var total = segments.reduce(function(s,x){ return s+x.amount; },0);

  if (!total) {
    ctx.fillStyle="#EEECEA"; ctx.beginPath(); ctx.arc(cx,cy,R,0,Math.PI*2); ctx.fill();
    ctx.fillStyle="#fff";    ctx.beginPath(); ctx.arc(cx,cy,IR,0,Math.PI*2); ctx.fill();
    ctx.fillStyle="#bbb"; ctx.textAlign="center";
    ctx.font="500 14px 'DM Sans',sans-serif";
    ctx.fillText("Ingen utgifter",cx,cy+5); return;
  }

  var ang = -Math.PI/2;
  segments.forEach(function(seg) {
    var slice = (seg.amount/total)*Math.PI*2;
    var isSel = S.pieSel===seg.cat;
    var off = isSel?10:0, mid=ang+slice/2;
    // Color: category color tinted by user (B=full saturation, C=lighter)
    var baseCol = catColor(seg.cat);
    var col;
    if (S.filter === "begge") {
      col = seg.user==="Benjamin" ? uc("Benjamin") : uc("Camilla");
      // Tint with category hue using opacity layering on canvas
      // Simpler: alternate lightness by blending cat color with user color
      col = blendHex(baseCol, uc(seg.user), 0.45);
    } else {
      col = baseCol;
    }
    ctx.beginPath();
    ctx.moveTo(cx+Math.cos(mid)*off, cy+Math.sin(mid)*off);
    ctx.arc(cx+Math.cos(mid)*off, cy+Math.sin(mid)*off, R+(isSel?6:0), ang, ang+slice);
    ctx.closePath();
    ctx.fillStyle=col; ctx.fill();
    ctx.strokeStyle="#fff"; ctx.lineWidth=2; ctx.stroke();
    ang+=slice;
  });

  ctx.fillStyle="#fff"; ctx.beginPath(); ctx.arc(cx,cy,IR,0,Math.PI*2); ctx.fill();
  ctx.textAlign="center";
  var tots=catTotals(m);
  if (S.pieSel && tots[S.pieSel]) {
    var pct=Math.round((tots[S.pieSel]/Object.values(tots).reduce(function(s,v){return s+v;},0))*100);
    ctx.font="700 22px 'DM Sans',sans-serif"; ctx.fillStyle="#1A1A1A";
    ctx.fillText(pct+"%",cx,cy-6);
    ctx.font="500 12px 'DM Sans',sans-serif"; ctx.fillStyle="#888";
    ctx.fillText(fmt(tots[S.pieSel])+" kr",cx,cy+14);
  } else {
    ctx.font="700 20px 'DM Sans',sans-serif"; ctx.fillStyle="#1A1A1A";
    ctx.fillText(fmt(total),cx,cy-4);
    ctx.font="500 12px 'DM Sans',sans-serif"; ctx.fillStyle="#888";
    ctx.fillText("kr totalt",cx,cy+14);
  }
}

// Simple hex color blend: mix c1 and c2 by ratio (0=c1, 1=c2)
function blendHex(c1, c2, ratio) {
  function hexToRgb(h) {
    h=h.replace("#","");
    return [parseInt(h.substring(0,2),16),parseInt(h.substring(2,4),16),parseInt(h.substring(4,6),16)];
  }
  var r1=hexToRgb(c1), r2=hexToRgb(c2);
  var r=Math.round(r1[0]*(1-ratio)+r2[0]*ratio);
  var g=Math.round(r1[1]*(1-ratio)+r2[1]*ratio);
  var b=Math.round(r1[2]*(1-ratio)+r2[2]*ratio);
  return "rgb("+r+","+g+","+b+")";
}

function pieClick(e) {
  var cv=document.getElementById("pieCanvas"); if(!cv) return;
  var r=cv.getBoundingClientRect();
  var x=e.clientX-r.left, y=e.clientY-r.top;
  var SZ=260,cx=SZ/2,cy=SZ/2,R=SZ*0.39,IR=SZ*0.21;
  var dx=x-cx,dy=y-cy,dist=Math.sqrt(dx*dx+dy*dy);
  var tots=catTotals(), total=Object.values(tots).reduce(function(s,v){return s+v;},0);
  if (!total) return;
  if (dist<IR||dist>R+15) { S.pieSel=null; render(); return; }

  // Rebuild same segment order as drawPie
  var segments=[];
  var m=monthKey();
  if (S.filter==="begge") {
    S.cats.forEach(function(cat){
      var bA=getEntries(m).filter(function(e){return e.user==="Benjamin"&&e.category===cat;}).reduce(function(s,e){return s+e.amount;},0);
      var cA=getEntries(m).filter(function(e){return e.user==="Camilla"&&e.category===cat;}).reduce(function(s,e){return s+e.amount;},0);
      if(bA>0) segments.push({cat:cat,amount:bA});
      if(cA>0) segments.push({cat:cat,amount:cA});
    });
  } else {
    sortedCatTotals(m).forEach(function(p){ segments.push({cat:p[0],amount:p[1]}); });
  }
  var segTotal=segments.reduce(function(s,x){return s+x.amount;},0);
  var ang=-Math.PI/2, ca=Math.atan2(dy,dx);
  if(ca<-Math.PI/2) ca+=Math.PI*2;
  for(var i=0;i<segments.length;i++){
    var slice=(segments[i].amount/segTotal)*Math.PI*2, end=ang+slice;
    var norm=ca; if(norm<ang) norm+=Math.PI*2;
    if(norm>=ang&&norm<end){ S.pieSel=S.pieSel===segments[i].cat?null:segments[i].cat; render(); return; }
    ang=end;
  }
}

// ─────────────────────────────────────────────────────────
// Render
// ─────────────────────────────────────────────────────────
function render() {
  var el=document.getElementById("content");
  if(S.tab==="hjem") el.innerHTML=renderHjem();
  else if(S.tab==="historikk") el.innerHTML=renderHistorikk();
  else el.innerHTML=renderLeaderboard();
  bindStatic();
  if(S.tab==="hjem") {
    drawPie();
    var cv=document.getElementById("pieCanvas");
    if(cv) cv.onclick=pieClick;
    bindHjem();
  }
  if(S.tab==="historikk") bindHistorikk();
}

// ─────────────────────────────────────────────────────────
// Hjem
// ─────────────────────────────────────────────────────────
function renderHjem() {
  var m=monthKey();
  var sorted=sortedCatTotals(m);
  var total=sorted.reduce(function(s,p){return s+p[1];},0);
  var h="";

  // Filter buttons
  h+='<div class="filter-row">';
  [["begge","Alle","fa"],["Benjamin","Benjamin","fb"],["Camilla","Camilla","fc"]].forEach(function(x){
    h+='<button class="fbtn'+(S.filter===x[0]?" "+x[2]:"")+'" data-filter="'+x[0]+'">'+x[1]+'</button>';
  });
  h+='</div>';

  // Pie + legend hint for "begge" mode
  h+='<div class="pie-wrap"><canvas id="pieCanvas"></canvas></div>';
  if (S.filter==="begge" && total>0) {
    h+='<div class="pie-legend-row">';
    h+='<span class="pie-legend-dot" style="background:'+PAL_B+'"></span>Benjamin &nbsp;';
    h+='<span class="pie-legend-dot" style="background:'+PAL_C+'"></span>Camilla';
    h+='</div>';
  }

  // Detail panel for selected category
  if (S.pieSel) {
    h+='<div class="detail-box open" id="detailBox"><div class="det-title">'+S.pieSel+'</div>';
    getFiltered(m).filter(function(e){return e.category===S.pieSel;})
      .sort(function(a,b){return new Date(b.date)-new Date(a.date);})
      .forEach(function(e){
        h+='<div class="det-row">';
        h+='<div><span style="font-size:13px;font-weight:500">'+e.category+'</span>';
        h+='<span style="font-size:12px;color:'+uc(e.user)+';margin-left:8px">'+e.user+'</span>';
        h+='<div class="det-meta">'+new Date(e.date).toLocaleDateString("nb-NO")+'</div></div>';
        h+='<div style="display:flex;align-items:center;gap:8px">';
        h+='<span style="font-weight:700">'+fmt(e.amount)+' kr</span>';
        h+='<button class="delbtn" data-del="'+m+'" data-id="'+e.id+'">&#215;</button>';
        h+='</div></div>';
      });
    h+='</div>';
  }

  // Legend — sorted high to low
  h+='<div class="legend-grid">';
  sorted.forEach(function(pair){
    var cat=pair[0], val=pair[1];
    var pct=total?Math.round((val/total)*100):0;
    var col=catColor(cat);
    var isSel=S.pieSel===cat;
    h+='<button class="leg" data-pie="'+cat+'"'+(isSel?' style="border-color:'+col+';border-width:1.5px"':'')+'>'; 
    h+='<div class="leg-dot-row"><div class="leg-dot" style="background:'+col+'"></div>';
    h+='<span class="leg-cat">'+cat+'</span></div>';
    h+='<div class="leg-amt">'+fmt(val)+' kr</div>';
    h+='<div class="leg-pct">'+pct+'%</div></button>';
  });
  h+='</div>';

  // Log form — amount input does NOT trigger full re-render
  h+='<div class="card"><div class="card-title">Logg utgift som '+S.user+'</div>';
  h+='<input class="amt-input" id="amtIn" type="number" inputmode="decimal" placeholder="Beløp i kr">';
  h+='<div class="cat-pills" id="catPills">';
  S.cats.forEach(function(cat,i){
    var on=S.catSel===cat;
    var col=CAT_PAL[i%CAT_PAL.length];
    h+='<button class="cpill'+(on?" on":"")+'" data-cat="'+cat+'"'+(on?' style="background:'+col+'"':'')+'>'+cat+'</button>';
  });
  h+='<button class="cpill" id="addCatToggle" style="border-style:dashed;color:#aaa">+ Legg til</button>';
  h+='</div>';

  if (S.showAddCat) {
    h+='<div class="add-cat-row">';
    h+='<input class="add-cat-in" id="newCatIn" placeholder="Ny kategori" autocomplete="off">';
    h+='<button class="add-cat-btn" id="doAddCat">Legg til</button></div>';
    h+='<div class="rm-hint">Trykk &#215; for å fjerne kategori:</div><div class="rm-pills">';
    S.cats.forEach(function(c){
      h+='<span class="rm-pill">'+c+'<button class="rm-x" data-rm="'+c+'">&#215;</button></span>';
    });
    h+='</div>';
  }

  h+='<button class="log-btn dis" id="doLog">Logg kostnad</button>';
  h+='</div>';

  // Budget summary
  h+='<div class="bud-grid">';
  USERS.forEach(function(u){
    var sp=totalSpent(u,m), bud=S.budgets[u];
    var pct=bud?Math.min(100,Math.round((sp/bud)*100)):null;
    h+='<div class="bud-card"><div class="bud-name">'+u+'</div>';
    h+='<div class="bud-amt" style="color:'+uc(u)+'">'+fmt(sp)+' kr</div>';
    if(bud>0){
      h+='<div class="bud-sub">av '+fmt(bud)+' kr</div>';
      h+='<div class="bar-bg"><div class="bar-fill" style="width:'+pct+'%;background:'+(pct>90?"#E05A5A":uc(u))+'"></div></div>';
    }
    h+='</div>';
  });
  h+='</div>';
  h+='<button class="set-bud" id="openBudModal">Sett månedlig budsjett</button>';
  h+='<div style="height:8px"></div>';
  return h;
}

// ─────────────────────────────────────────────────────────
// Historikk
// ─────────────────────────────────────────────────────────
function renderHistorikk() {
  var months=allMonths(), cur=monthKey();
  if(!months.length) return '<div class="empty">Ingen data ennå</div>';
  var h='<div style="padding:16px 0 0"><div style="font-weight:700;font-size:18px;padding:0 16px 10px">Historikk</div>';
  months.forEach(function(m){
    var me=getEntries(m);
    var mt=me.reduce(function(s,e){return s+e.amount;},0);
    var bt=me.filter(function(e){return e.user==="Benjamin";}).reduce(function(s,e){return s+e.amount;},0);
    var ct=me.filter(function(e){return e.user==="Camilla";}).reduce(function(s,e){return s+e.amount;},0);
    var isOpen=S.expandedMonth===m;
    var cT={};
    me.forEach(function(e){cT[e.category]=(cT[e.category]||0)+e.amount;});
    h+='<div class="month-card">';
    h+='<button class="month-hdr" data-month="'+m+'">';
    h+='<div><div class="month-name">'+monthLabel(m)+'</div>';
    h+='<div class="month-sub"><span style="color:'+uc("Benjamin")+'">B: '+fmt(bt)+' kr</span>&nbsp;&nbsp;';
    h+='<span style="color:'+uc("Camilla")+'">C: '+fmt(ct)+' kr</span></div></div>';
    h+='<div class="month-r"><div class="month-total">'+fmt(mt)+' kr</div>';
    h+='<div class="month-cnt">'+me.length+' poster '+(isOpen?"▴":"▾")+'</div></div></button>';
    if(isOpen){
      h+='<div class="month-body open"><div class="cat-badges">';
      Object.keys(cT).forEach(function(cat,i){
        var col=catColor(cat);
        h+='<span class="cbadge" style="background:'+col+'22;color:'+col+'">'+cat+': '+fmt(cT[cat])+' kr</span>';
      });
      h+='</div>';
      me.slice().sort(function(a,b){return new Date(b.date)-new Date(a.date);}).forEach(function(e){
        h+='<div class="det-row">';
        h+='<div><span style="font-size:13px;font-weight:500">'+e.category+'</span>';
        h+='<span style="font-size:12px;color:'+uc(e.user)+';margin-left:6px">'+e.user+'</span>';
        h+='<div class="det-meta">'+new Date(e.date).toLocaleDateString("nb-NO")+'</div></div>';
        h+='<div style="display:flex;align-items:center;gap:8px">';
        h+='<span style="font-weight:700;font-size:14px">'+fmt(e.amount)+' kr</span>';
        // Allow deleting from any month
        h+='<button class="delbtn" data-del="'+m+'" data-id="'+e.id+'">&#215;</button>';
        h+='</div></div>';
      });
      h+='</div>';
    } else {
      h+='<div class="month-body"></div>';
    }
    h+='</div>';
  });
  h+='</div>';
  return h;
}

// ─────────────────────────────────────────────────────────
// Leaderboard
// ─────────────────────────────────────────────────────────
function renderLeaderboard() {
  var m=monthKey();
  var data=USERS.map(function(u){return{user:u,current:totalSpent(u,m),budget:S.budgets[u]};})
    .sort(function(a,b){return a.current-b.current;});
  var winner=data[0],loser=data[1],diff=Math.abs(winner.current-loser.current);
  var months=allMonths();
  var h='<div class="winner-card">';
  h+='<div class="trophy">&#127942;</div>';
  h+='<div class="winner-name" style="color:'+uc(winner.user)+'">'+winner.user+'</div>';
  h+='<div class="winner-sub">bruker minst penger denne måneden!</div>';
  h+='<div class="winner-amt">'+fmt(winner.current)+' kr</div></div>';
  data.forEach(function(d,i){
    var isW=i===0,other=data[1-i];
    var pct=d.budget?Math.min(100,Math.round((d.current/d.budget)*100)):null;
    var diffTxt=isW?fmt(diff)+" kr spart vs "+other.user:fmt(diff)+" kr mer enn "+other.user;
    var minis="";
    S.cats.forEach(function(cat){
      var val=getEntries(m).filter(function(e){return e.user===d.user&&e.category===cat;})
        .reduce(function(s,e){return s+e.amount;},0);
      if(val) minis+='<div class="mini"><div class="mini-n">'+cat+'</div><div class="mini-v">'+fmt(val)+' kr</div></div>';
    });
    h+='<div class="lb-card"'+(isW?' style="border-color:'+uc(d.user)+'88"':'')+'>'; 
    h+='<div class="lb-top"><div class="lb-av" style="background:'+uc(d.user)+'">'+d.user[0]+'</div>';
    h+='<div style="flex:1"><div class="lb-name">'+d.user+'</div><div class="lb-diff">'+diffTxt+'</div></div>';
    h+='<div style="text-align:right"><div class="lb-spent" style="color:'+uc(d.user)+'">'+fmt(d.current)+' kr</div>';
    h+='<div class="lb-lbl">denne måneden</div></div></div>';
    if(pct!==null){
      h+='<div style="display:flex;justify-content:space-between;font-size:12px;color:#aaa;margin-bottom:5px">';
      h+='<span>Budsjett '+fmt(d.budget)+' kr</span><span>'+pct+'% brukt</span></div>';
      h+='<div class="bar-bg"><div class="bar-fill" style="width:'+pct+'%;background:'+(pct>90?"#E05A5A":uc(d.user))+'"></div></div>';
    }
    if(minis) h+='<div class="mini-grid">'+minis+'</div>';
    h+='</div>';
  });
  if(months.length>1){
    h+='<div class="alltime"><div class="alltime-title">Alle måneder</div>';
    USERS.forEach(function(u){
      var ml=months.map(function(mo){return{m:mo,t:totalSpent(u,mo)};});
      var best=ml.reduce(function(a,b){return a.t<b.t?a:b;});
      var avg=Math.round(ml.reduce(function(s,x){return s+x.t;},0)/ml.length);
      h+='<div class="at-card"><span style="font-weight:600;color:'+uc(u)+'">'+u+'</span>';
      h+='<div style="text-align:right"><div style="font-size:12px;color:#aaa">Snitt: '+fmt(avg)+' kr/mnd</div>';
      h+='<div style="font-size:12px;color:#aaa">Beste: '+monthLabel(best.m)+' ('+fmt(best.t)+' kr)</div></div></div>';
    });
    h+='</div>';
  }
  h+='<div style="height:8px"></div>';
  return h;
}

// ─────────────────────────────────────────────────────────
// Event binding — split into static (always) + per-tab
// ─────────────────────────────────────────────────────────
function bindStatic() {
  document.getElementById("tab-hjem").onclick        = function(){ switchTab("hjem"); };
  document.getElementById("tab-historikk").onclick   = function(){ switchTab("historikk"); };
  document.getElementById("tab-leaderboard").onclick = function(){ switchTab("leaderboard"); };
  document.getElementById("btnB").onclick = function(){ switchUser("Benjamin"); };
  document.getElementById("btnC").onclick = function(){ switchUser("Camilla"); };
  document.getElementById("modalCancel").onclick = function(){
    document.getElementById("budModal").classList.remove("open");
  };
  document.getElementById("modalSave").onclick = function(){
    S.budgets.Benjamin=parseFloat(document.getElementById("budB").value)||0;
    S.budgets.Camilla =parseFloat(document.getElementById("budC").value)||0;
    saveSettings();
    document.getElementById("budModal").classList.remove("open");
    showToast("Budsjett lagret"); render();
  };
}

function bindHjem() {
  // Filter buttons
  document.querySelectorAll("[data-filter]").forEach(function(btn){
    btn.onclick=function(){S.filter=btn.dataset.filter;S.pieSel=null;render();};
  });

  // Legend pie selection
  document.querySelectorAll("[data-pie]").forEach(function(btn){
    btn.onclick=function(){S.pieSel=S.pieSel===btn.dataset.pie?null:btn.dataset.pie;render();};
  });

  // Delete buttons in detail panel
  document.querySelectorAll(".delbtn").forEach(function(btn){
    btn.onclick=function(e){
      e.stopPropagation();
      var m=btn.dataset.del, id=Number(btn.dataset.id);
      S.entries[m]=(S.entries[m]||[]).filter(function(e){return e.id!==id;});
      if(!S.entries[m].length) delete S.entries[m];
      saveEntries(); render();
    };
  });

  // Amount input — update state but DON'T re-render (preserves focus)
  var amtIn=document.getElementById("amtIn");
  if(amtIn){
    amtIn.focus();
    amtIn.oninput=function(){
      updateLogBtn();
    };
    amtIn.onkeydown=function(e){ if(e.key==="Enter") doLog(); };
  }

  // Category pills
  document.querySelectorAll("[data-cat]").forEach(function(btn){
    btn.onclick=function(){
      S.catSel=S.catSel===btn.dataset.cat?null:btn.dataset.cat;
      // Update pill styles without re-render
      document.querySelectorAll("[data-cat]").forEach(function(b,i){
        var on=S.catSel===b.dataset.cat;
        b.className="cpill"+(on?" on":"");
        b.style.background=on?CAT_PAL[i%CAT_PAL.length]:"";
      });
      updateLogBtn();
    };
  });

  // Add cat toggle
  var toggle=document.getElementById("addCatToggle");
  if(toggle) toggle.onclick=function(){S.showAddCat=!S.showAddCat;render();};

  // New cat input
  var ncIn=document.getElementById("newCatIn");
  if(ncIn){
    ncIn.focus();
    ncIn.oninput=function(){S.newCat=ncIn.value;};
    ncIn.onkeydown=function(e){if(e.key==="Enter") addCat();};
  }

  // Add cat button
  var doAddCat=document.getElementById("doAddCat");
  if(doAddCat) doAddCat.onclick=addCat;

  // Remove cat buttons
  document.querySelectorAll(".rm-x").forEach(function(btn){
    btn.onclick=function(){
      var cat=btn.dataset.rm;
      S.cats=S.cats.filter(function(c){return c!==cat;});
      if(S.catSel===cat) S.catSel=null;
      saveSettings(); render();
    };
  });

  // Log button
  var logBtn=document.getElementById("doLog");
  if(logBtn) logBtn.onclick=doLog;

  // Budget modal open
  var openBud=document.getElementById("openBudModal");
  if(openBud) openBud.onclick=function(){
    document.getElementById("budB").value=S.budgets.Benjamin||"";
    document.getElementById("budC").value=S.budgets.Camilla||"";
    document.getElementById("budModal").classList.add("open");
  };
}

function bindHistorikk() {
  // Delete buttons in historikk (all months)
  document.querySelectorAll(".delbtn").forEach(function(btn){
    btn.onclick=function(e){
      e.stopPropagation();
      var m=btn.dataset.del, id=Number(btn.dataset.id);
      S.entries[m]=(S.entries[m]||[]).filter(function(x){return x.id!==id;});
      if(!S.entries[m].length) delete S.entries[m];
      saveEntries(); render();
    };
  });
}

// ─────────────────────────────────────────────────────────
// Global event delegation (set up once)
// ─────────────────────────────────────────────────────────
function setupDelegation() {
  document.getElementById("content").addEventListener("click", function(e){
    // Month header toggle
    var hdr=e.target.closest("[data-month]");
    if(hdr){
      var m=hdr.dataset.month;
      S.expandedMonth=S.expandedMonth===m?null:m;
      render(); return;
    }
  });
}

// ─────────────────────────────────────────────────────────
// Log cost button state — no re-render needed
// ─────────────────────────────────────────────────────────
function updateLogBtn() {
  var amtIn=document.getElementById("amtIn");
  var logBtn=document.getElementById("doLog");
  if(!amtIn||!logBtn) return;
  var num=parseFloat(String(amtIn.value||"").replace(",","."));
  var canLog=num>0&&S.catSel;
  logBtn.className="log-btn "+(canLog?"rdy":"dis");
  logBtn.style.background=canLog?uc(S.user):"";
}

// ─────────────────────────────────────────────────────────
// Actions
// ─────────────────────────────────────────────────────────
function switchTab(tab){
  S.tab=tab;
  ["hjem","historikk","leaderboard"].forEach(function(t){
    document.getElementById("tab-"+t).className="tab"+(t===tab?" on":"");
  });
  render();
}

function switchUser(u){
  S.user=u;
  document.getElementById("btnB").className="ubtn b-on"+(u!=="Benjamin"?" off":"");
  document.getElementById("btnC").className="ubtn c-on"+(u!=="Camilla"?" off":"");
  render();
}

function doLog(){
  var amtIn=document.getElementById("amtIn");
  var num=parseFloat(String(amtIn?amtIn.value:"").replace(",","."));
  if(!num||num<=0||!S.catSel) return;
  var m=monthKey();
  if(!S.entries[m]) S.entries[m]=[];
  S.entries[m].push({id:Date.now(),user:S.user,category:S.catSel,amount:num,date:new Date().toISOString()});
  S.catSel=null;
  saveEntries();
  showToast("✓ "+fmt(num)+" kr logget");
  render();
}

function addCat(){
  var name=(S.newCat||"").trim();
  if(!name||S.cats.indexOf(name)>=0) return;
  S.cats.push(name);
  S.newCat=""; S.showAddCat=false;
  saveSettings(); render();
}
</script>
